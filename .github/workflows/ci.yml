name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test with coverage
        run: bun run test:coverage
        working-directory: packages/zest-ui

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: packages/zest-ui/coverage
          fail_ci_if_error: false

      - name: Build (library)
        run: bun run build

      - name: Check bundle size
        working-directory: packages/zest-ui
        run: npx size-limit

      - name: Verify the package packs
        # `npm pack` runs the package's `prepack` (a clean rebuild) and reports the
        # exact tarball contents, catching a broken `files`/`exports` before publish.
        working-directory: packages/zest-ui
        run: npm pack --dry-run
