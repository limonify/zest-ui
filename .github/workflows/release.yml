name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # commit the version bump back to main
  id-token: write # npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @limonify/zest-ui to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Needed so the version-bump commit can push to main after a tag release.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Set up Node (npm auth)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync package version from release tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} is not a semver version (expected vX.Y.Z)"
            exit 1
          fi
          # Do not use `npm version` here: npm walks the bun workspace and dies on
          # `workspace:*` (EUNSUPPORTEDPROTOCOL). Just rewrite the version field.
          TAG="$TAG" node <<'EOF'
          const fs = require('fs');
          const path = 'packages/zest-ui/package.json';
          const version = process.env.TAG;
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          console.log(`Publishing @limonify/zest-ui@${version}`);
          EOF

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify (typecheck · test · build)
        run: |
          bun run typecheck
          bun run test
          bun run build

      - name: Publish to npm
        working-directory: packages/zest-ui
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump to main
        if: github.event_name == 'release'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          TAG="$VERSION" node <<'EOF'
          const fs = require('fs');
          const path = 'packages/zest-ui/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.version = process.env.TAG;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          EOF
          git add packages/zest-ui/package.json
          if git diff --staged --quiet; then
            echo "main already at $VERSION — nothing to commit"
            exit 0
          fi
          git commit -m "chore: release v${VERSION}"
          git push origin main
