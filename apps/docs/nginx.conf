server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp|avif|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
